<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Web App</title>
    <style>
        body { font-family: 'Prompt', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 15px; }
        button { background-color: #28a745; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:active { background-color: #218838; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 15px; color: #666; font-size: 14px; min-height: 40px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h3>📸 สแกนข้อความลง Sheet</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    <button id="btn-scan">กดถ่ายรูปเพื่อสแกน</button>
    <div id="status">กำลังเปิดกล้อง...</div>
</div>

<script>
    // *** เปลี่ยน URL ด้านล่างนี้เป็น Web App URL ของคุณ ***
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwqcbVehq7IHIzOK0oNw4IPIy8iVpeXWxWc7eyh44DMFumNo4NCH73qXq2mocPQgYC9/exec";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btnScan = document.getElementById('btn-scan');
    const status = document.getElementById('status');

    // เริ่มต้นกล้อง
    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            status.innerText = "เล็งไปที่ข้อความแล้วกดปุ่มสแกน";
        } catch (err) {
            status.innerText = "ไม่สามารถเปิดกล้องได้: " + err.message;
        }
    }

    btnScan.addEventListener('click', async () => {
        status.innerHTML = "⏳ กำลังถ่ายภาพและประมวลผล...";
        btnScan.disabled = true;

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // บีบอัดไฟล์ภาพเล็กน้อย (0.7) เพื่อให้ส่งข้อมูลได้เร็วขึ้น
        const base64Image = canvas.toDataURL('image/jpeg', 0.7);

        try {
            // ส่งข้อมูลไปยัง GAS (ใช้โหมด no-cors เพื่อข้ามปัญหา Security ของเบราว์เซอร์)
            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify({ image: base64Image })
            });

            status.innerHTML = "<b style='color:green;'>✅ ส่งข้อมูลเรียบร้อย!</b><br>โปรดตรวจสอบข้อมูลใน Google Sheet";
        } catch (err) {
            status.innerText = "❌ เกิดข้อผิดพลาด: " + err.message;
        } finally {
            setTimeout(() => {
                btnScan.disabled = false;
                status.innerText = "พร้อมสแกนภาพถัดไป";
            }, 3000);
        }
    });

    window.onload = startCamera;
</script>

</body>
</html>
