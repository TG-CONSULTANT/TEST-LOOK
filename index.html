<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCR Scanner to Google Sheets</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --success: #27ae60; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 500px; margin-top: 2rem; }
        h2 { color: var(--primary); text-align: center; margin-bottom: 1.5rem; }
        .config-section { background: #eef2f3; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        #video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 1rem; }
        .btn { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; transition: 0.3s; }
        .btn-scan { background: var(--success); color: white; margin-bottom: 1rem; }
        .btn-scan:disabled { background: #95a5a6; cursor: not-allowed; }
        #status { font-size: 14px; color: #666; text-align: center; min-height: 20px; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner Web App</h2>

    <div class="config-section">
        <label style="font-size: 12px; color: #555;">วาง Web App URL จาก Google Apps Script:</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>

    <video id="video" autoplay playsinline></video>
    <button id="scanBtn" class="btn btn-scan">สแกนและส่งข้อมูล</button>
    
    <div id="status">รอการเชื่อมต่อกล้อง...</div>
    <canvas id="canvas"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const scanBtn = document.getElementById('scanBtn');
    const status = document.getElementById('status');
    const scriptUrlInput = document.getElementById('scriptUrl');
    const canvas = document.getElementById('canvas');

    // เรียกใช้งานกล้อง
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            video.srcObject = stream;
            status.innerText = "กล้องพร้อมใช้งาน";
        })
        .catch(err => {
            status.innerText = "ไม่สามารถเปิดกล้องได้: " + err.message;
        });

    scanBtn.addEventListener('click', async () => {
        const url = scriptUrlInput.value.trim();
        
        if (!url) {
            alert("https://script.google.com/macros/s/AKfycbwOJals3bF2-EsAp9U2NED4OAu_H_FI1_0xIzZhzEQIAaXFQhhO_9Nq2NaHox6-AxgT/exec");
            return;
        }

        scanBtn.disabled = true;
        status.innerText = "กำลังสแกนข้อความ (OCR)...";

        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        try {
            // ทำ OCR
            const { data: { text } } = await Tesseract.recognize(canvas.toDataURL(), 'tha+eng');
            const lines = text.split('\n').filter(l => l.trim() !== "");
            
            const colA = lines[0] || "N/A";
            const colB = lines[2] || "N/A";

            status.innerText = `พบข้อมูล: A=${colA}, B=${colB} กำลังส่งข้อมูล...`;

            // ส่งข้อมูลไปยัง Apps Script ผ่าน Fetch API (JSONP/CORS)
            // หมายเหตุ: ในฝั่ง code.gs ต้องใช้ฟังก์ชัน doPost(e) หรือ doGet(e) ที่รองรับ CORS
            const finalUrl = `${url}?colA=${encodeURIComponent(colA)}&colB=${encodeURIComponent(colB)}`;

            fetch(finalUrl, { method: 'GET', mode: 'no-cors' })
                .then(() => {
                    status.innerText = "✅ บันทึกข้อมูลเรียบร้อย!";
                    setTimeout(() => { status.innerText = "กล้องพร้อมใช้งาน"; scanBtn.disabled = false; }, 3000);
                })
                .catch(err => {
                    status.innerText = "❌ ส่งข้อมูลไม่สำเร็จ";
                    scanBtn.disabled = false;
                });

        } catch (err) {
            status.innerText = "❌ เกิดข้อผิดพลาด";
            console.error(err);
            scanBtn.disabled = false;
        }
    });
</script>

</body>
</html>
