<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Scanner - GitHub Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f0f2f5; }
        #video { width: 100%; max-width: 400px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: #000; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 20px; width: 100%; transition: 0.3s; }
        button:disabled { background-color: #ccc; }
        #status { margin-top: 20px; font-size: 14px; color: #555; line-height: 1.6; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 สแกนข้อความลง Sheet</h2>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <button id="capture-btn">กดเพื่อถ่ายรูปและอ่านข้อความ</button>
    <div id="status">กรุณาอนุญาตให้เข้าถึงกล้อง...</div>
</div>

<script>
    // *** วาง URL ที่ได้จากหน้า Deploy ของ Google Apps Script ที่นี่ ***
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnG48NChWQEZCjLN5X32QRfXIjkUWpCpJaXLtarWL9rcL_Q3IW7mMcIAw5jTmVGDNT/exec";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const btn = document.getElementById('capture-btn');
    const status = document.getElementById('status');

    // เรียกใช้งานกล้อง
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" }, 
                audio: false 
            });
            video.srcObject = stream;
            status.innerText = "กล้องพร้อมใช้งาน - เล็งไปที่ข้อความ";
        } catch (err) {
            status.innerText = "ผิดพลาด: ไม่สามารถเปิดกล้องได้ (" + err.message + ")";
        }
    }

    btn.addEventListener('click', async () => {
        status.innerText = "⏳ กำลังบันทึกภาพและประมวลผล...";
        btn.disabled = true;

        // วาดรูปลง Canvas
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        // แปลงเป็น Base64
        const base64Image = canvas.toDataURL('image/jpeg');

        try {
            // ส่งข้อมูลไปยัง Google Apps Script ด้วย Fetch
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // จำเป็นต้องใช้ no-cors สำหรับ GAS Web App
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: base64Image })
            });

            // หมายเหตุ: เนื่องจากโหมด no-cors จะอ่าน response ตรงๆ ไม่ได้ 
            // จึงต้องใช้การหน่วงเวลาหรือเช็คสถานะจากฝั่ง Sheet แทน 
            // หรือเปลี่ยนวิธีจัดการ Response เล็กน้อย
            status.innerHTML = "✅ ส่งข้อมูลเรียบร้อย!<br>กรุณาตรวจสอบใน Google Sheet";
            
        } catch (error) {
            status.innerText = "❌ เกิดข้อผิดพลาด: " + error.message;
        } finally {
            btn.disabled = false;
        }
    });

    window.onload = initCamera;
</script>

</body>
</html>
